acceleration:
  compilation_mode: reduce-overhead
  compile_with_inductor: false
  load_text_encoder_in_8bit: false
  mixed_precision_mode: bf16
  quantization: null
checkpoints:
  interval: 5000
  keep_last_n: -1
conditioning:
  first_frame_conditioning_p: 0.1
  mode: none
  reference_latents_dir: ref_latents
data:
  num_dataloader_workers: 2
  preprocessed_data_root: /high_perf_store3/world-model/tianzexia/xtz_datatransfer/tianzexia/nuplan_ltx/.precomputed
flow_matching:
  timestep_sampling_mode: shifted_logit_normal
  timestep_sampling_params: {}
hub:
  hub_model_id: null
  push_to_hub: false
lora: null
model:
  load_checkpoint: null
  model_source: /high_perf_store3/world-model/tianzexia/xtz_datatransfer/tianzexia/LTX-Video-0.9.5
  training_mode: full
optimization:
  batch_size: 1
  enable_gradient_checkpointing: false
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-05
  max_grad_norm: 1.0
  optimizer_type: adamw
  scheduler_params: {}
  scheduler_type: linear
  steps: 30000
output_dir: /high_perf_store3/world-model/tianzexia/xtz_datatransfer/tianzexia/DriveLaW-open-source/video_generation_training/test
seed: 42
validation:
  guidance_scale: 3.5
  images:
  - /high_perf_store3/world-model/tianzexia/xtz_datatransfer/tianzexia/231_unzip/notebooks/demo_pic1.jpg
  inference_steps: 30
  interval: 500
  negative_prompt: worst quality, inconsistent motion, blurry, jittery, distorted
  prompts:
  - "Using the past 1.12 seconds of vehicle motion from a dashboard camera \u2014\
    \ maintaining straight trajectory, forward 1.01m, lateral 0.02m, yaw -0.7\xB0\
    , average speed 0.90m/s \u2014 predict and generate the next 4.12s as continuous,\
    \ realistic driving."
  reference_videos: null
  seed: 42
  skip_initial_validation: false
  video_dims: !!python/tuple
  - 704
  - 704
  - 32
  videos_per_prompt: 1
wandb:
  enabled: false
  entity: null
  log_validation_videos: true
  project: ltxv-trainer
  tags: []
